<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aliança Lopes - Lista de Presentes</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Família Lopes: Episódio I</h1>
        <p>A Força está com quem contribui.</p>

        <div class="presente">
            <img src="images/Duelo.png" alt="Duelo Espacial">
            <h3>Duelo Espacial</h3>
            <p>Efeitos especiais inclusos. Dignidade não garantida.</p>
            <button onclick="copiarPix()">Copiar PIX da Força</button>
        </div>

        <div class="presente">
            <img src="images/Foguete.png" alt="Combustível">
            <h3>Combustível da Lua de Mel</h3>
            <p>Destino: Romance Interplanetário.</p>
            <button onclick="copiarPix()">Copiar PIX da Força</button>
        </div>
        
        <div class="presente">
            <img src="images/Podrace.jpeg" alt="Corrida de Pods">
            <h3>Corrida de Pods</h3>
            <p>Alta velocidade na Orla Exterior.</p>
            <button onclick="copiarPix()">Copiar PIX da Força</button>
        </div>

    </div>

    <script>
        function copiarPix() {
            const pix = "SUA_CHAVE_PIX_AQUI"; // Coloque seu PIX aqui!
            navigator.clipboard.writeText(pix);
            alert("Chave PIX copiada! Que a Força esteja com você.");
        }
    </script>
</body>
</html>
