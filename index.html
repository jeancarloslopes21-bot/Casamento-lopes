<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Aliança Lopes - Lista de Presentes</title>
</head>
<body>
    <div class="container">
        <h1>Família Lopes: Episódio I</h1>
        <p>A Força está com quem contribui.</p>

        <div class="presente">
            <img src="images/duelo-espacial.jpg" alt="Duelo Espacial">
            <h3>1. Duelo Espacial com o Noivo</h3>
            <p>Efeitos especiais incluso. Dignidade não garantida.</p>
            <button onclick="copiarPix()">Copiar PIX da Força</button>
        </div>
    </div>

    <script>
        function copiarPix() {
            const pix = "SUA_CHAVE_PIX_AQUI";
            navigator.clipboard.writeText(pix);
            alert("Chave PIX copiada!");
        }
    </script>
</body>
</html>
